apiVersion: v1
kind: Pod
metadata:
  name: pod-1
spec:
 containers:
  - name: nginx
    image: nginx
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-2
  labels:
    app: demo-affinity
spec:
  affinity:
    podAffinity:
     requiredDuringSchedulingIgnoreDuringExecution:
      labelSelector:
      - matchExpressions:
        - key: "app"
          operator: In
          values: 
          - demo-affinity
  containers:
   - name: nginx
     image: nginx