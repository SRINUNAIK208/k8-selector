apiVersion: v1
kind: Pod
metadata:
  name: nod-anti-affinity
spec:
  affinity:
    nodeaffinity:
      requireDuringSchedulingIgnoreDuringExecution:
       nodeSelectorTerms:
        - matchExpressions:
          - key: "hardware"
            operator: NotIn
            value:
            - gpu
  containers:
   - name: nginx
     image: nginx